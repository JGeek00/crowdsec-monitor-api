version: '3.8'

services:
  crowdsec-monitor-api:
    image: ghcr.io/jgeek00/crowdsec-monitor-api:latest
    container_name: crowdsec-monitor-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CROWDSEC_LAPI_URL=http://<crowdsec container_name>:8080
      - CROWDSEC_USER=crowdsec_user
      - CROWDSEC_PASSWORD=crowdsec_password
      - DB_MODE=postgres # Options: sqlite, postgres
      - POSTGRES_HOST=crowdsec-postgres:5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=crowdsec-monitor
      - SYNC_INTERVAL_SECONDS=30 # Optional, interval in seconds (default 30 seconds)
      - DATA_RETENTION=2w # Optional, default is indefinite
      - API_PASSWORD= # Optional, leave empty to disable authentication
      - RATE_LIMIT= # Optional, format: <requests>/<minutes>, leave empty to disable rate limiting
    depends_on:
      crowdsec-postgres:
        condition: service_healthy

  crowdsec-postgres:
    image: postgres:18-alpine
    container_name: crowdsec-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: crowdsec-monitor
    volumes:
      - ./pg-database:/var/lib/postgresql