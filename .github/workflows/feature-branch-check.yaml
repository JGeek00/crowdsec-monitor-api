name: Feature Branch Check

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "merge/**"
      - "release/**"

permissions:
  contents: read

jobs:
  validate-branch-origin:
    name: Validate Branch Origin
    runs-on: ubuntu-24.04
    if: "!contains(github.ref, 'release/')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch remote branches
        run: |
          git fetch origin 'refs/heads/release/*:refs/remotes/origin/release/*'

      - name: Validate branch naming
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" =~ ^feature/ ]]; then
            echo "Branch type: feature"
          elif [[ "$BRANCH" =~ ^bugfix/ ]]; then
            echo "Branch type: bugfix"
          elif [[ "$BRANCH" =~ ^merge/release- ]]; then
            echo "Branch type: merge"
          else
            echo "ERROR: Branch '$BRANCH' does not match feature/**, bugfix/** or merge/release-*"
            exit 1
          fi
          echo "Branch name is valid: $BRANCH"

      - name: Validate merge branch naming convention
        if: contains(github.ref, 'merge/')
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH" | sed 's|^merge/release-||')

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid merge branch name '$BRANCH'"
            echo "Expected format: merge/release-X.X.X"
            exit 1
          fi

          echo "Merge branch version: $VERSION"

      - name: Check branch originates from release branch
        run: |
          echo "Checking if branch diverged from a release/* branch..."

          FOUND=0
          for branch in $(git branch -r --list 'origin/release/*' | sed 's/origin\///'); do
            MERGE_BASE=$(git merge-base HEAD "origin/$branch" 2>/dev/null) || continue
            RELEASE_HEAD=$(git rev-parse "origin/$branch")

            if [ "$MERGE_BASE" = "$RELEASE_HEAD" ]; then
              echo "Branch diverged from '$branch' at commit $RELEASE_HEAD"
              FOUND=1
              break
            fi

            BASE_VERSION=$(echo "$branch" | sed 's/release\///')
            echo "Checking $branch (v$BASE_VERSION)... merge-base=$MERGE_BASE, release-head=$RELEASE_HEAD"
          done

          if [ "$FOUND" -eq 0 ]; then
            echo ""
            echo "ERROR: This branch does not originate from any release/* branch."
            echo "Feature, bugfix and merge branches must be created from a release/* branch."
            echo ""
            echo "Available release branches:"
            git branch -r --list 'origin/release/*' || echo "  (none found)"
            exit 1
          fi

          echo "Branch origin validation passed."

  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-24.04
    if: contains(github.ref, 'release/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: |
          git fetch --tags

      - name: Extract version from branch name
        id: branchversion
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH" | sed 's|^release/||')

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid release branch name '$BRANCH'"
            echo "Expected format: release/X.X.X"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Get last stable tag
        id: lasttag
        run: |
          LAST_TAG=$(git tag -l 'v*' | grep -v '\-beta' | sort -V | tail -n 1)

          if [ -z "$LAST_TAG" ]; then
            echo "ERROR: No stable tags found. Cannot validate version bump."
            exit 1
          fi

          LAST_VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
          echo "LAST_VERSION=$LAST_VERSION" >> $GITHUB_OUTPUT
          echo "Last stable tag: $LAST_TAG ($LAST_VERSION)"

      - name: Validate version bump
        run: |
          NEW_VERSION="${{ steps.branchversion.outputs.VERSION }}"
          LAST_VERSION="${{ steps.lasttag.outputs.LAST_VERSION }}"

          IFS='.' read -r NEW_MAJOR NEW_MINOR NEW_BUGFIX <<< "$NEW_VERSION"
          IFS='.' read -r LAST_MAJOR LAST_MINOR LAST_BUGFIX <<< "$LAST_VERSION"

          MAJOR_DIFF=$((NEW_MAJOR - LAST_MAJOR))
          MINOR_DIFF=$((NEW_MINOR - LAST_MINOR))
          BUGFIX_DIFF=$((NEW_BUGFIX - LAST_BUGFIX))

          echo "Comparing $NEW_VERSION vs $LAST_VERSION"
          echo "  Major diff: $MAJOR_DIFF, Minor diff: $MINOR_DIFF, Bugfix diff: $BUGFIX_DIFF"

          if [ "$MAJOR_DIFF" -gt 1 ]; then
            echo ""
            echo "ERROR: Major version jump is too large."
            echo "  From $LAST_VERSION to $NEW_VERSION (jumped $MAJOR_DIFF majors)"
            echo "  Major must be exactly +1 from last stable version."
            exit 1
          fi

          if [ "$MAJOR_DIFF" -eq 1 ]; then
            if [ "$NEW_MINOR" -ne 0 ] || [ "$NEW_BUGFIX" -ne 0 ]; then
              echo ""
              echo "ERROR: On major bump, minor and bugfix must be 0."
              echo "  Expected: $((LAST_MAJOR + 1)).0.0"
              echo "  Got: $NEW_VERSION"
              exit 1
            fi
            echo "Valid major bump: $LAST_VERSION → $NEW_VERSION"
            exit 0
          fi

          if [ "$MAJOR_DIFF" -lt 0 ]; then
            echo ""
            echo "ERROR: Major version cannot decrease."
            echo "  From $LAST_VERSION to $NEW_VERSION"
            exit 1
          fi

          if [ "$MINOR_DIFF" -gt 1 ]; then
            echo ""
            echo "ERROR: Minor version jump is too large."
            echo "  From $LAST_VERSION to $NEW_VERSION (jumped $MINOR_DIFF minors)"
            echo "  Minor must be exactly +1 from last stable version."
            exit 1
          fi

          if [ "$MINOR_DIFF" -eq 1 ]; then
            if [ "$NEW_BUGFIX" -ne 0 ]; then
              echo ""
              echo "ERROR: On minor bump, bugfix must be 0."
              echo "  Expected: $LAST_MAJOR.$((LAST_MINOR + 1)).0"
              echo "  Got: $NEW_VERSION"
              exit 1
            fi
            echo "Valid minor bump: $LAST_VERSION → $NEW_VERSION"
            exit 0
          fi

          if [ "$MINOR_DIFF" -lt 0 ]; then
            echo ""
            echo "ERROR: Minor version cannot decrease."
            echo "  From $LAST_VERSION to $NEW_VERSION"
            exit 1
          fi

          if [ "$BUGFIX_DIFF" -ne 1 ]; then
            echo ""
            echo "ERROR: Bugfix must be exactly +1 from last stable version."
            echo "  Expected: $LAST_MAJOR.$LAST_MINOR.$((LAST_BUGFIX + 1))"
            echo "  Got: $NEW_VERSION (diff: $BUGFIX_DIFF)"
            exit 1
          fi

          echo "Valid bugfix bump: $LAST_VERSION → $NEW_VERSION"

  build-check:
    name: Build Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile

      - name: TypeScript compile check
        run: |
          corepack enable
          pnpm exec tsc --noEmit
