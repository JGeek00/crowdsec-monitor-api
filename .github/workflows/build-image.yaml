name: Deploy Image to GHCR

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_beta: ${{ steps.release_type.outputs.IS_BETA }}
      channel_tag: ${{ steps.release_type.outputs.CHANNEL_TAG }}
      changelog_path: ${{ steps.changelog.outputs.CHANGELOG_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify actor authorization
        run: |
          ACTOR="${{ github.actor }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "${ACTOR,,}" != "${OWNER,,}" ]]; then
            echo "ERROR: Only $OWNER can trigger deployments."
            echo "Actor '$ACTOR' is not authorized."
            exit 1
          fi
          echo "Authorized actor: $ACTOR"

      - name: Verify tag signature
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ github.ref_name }}"
          if ! git tag -v "$TAG" 2>&1; then
            echo "WARNING: Tag '$TAG' is not signed or signature could not be verified."
            echo "Consider using signed tags: git tag -s vX.X.X"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Validate tag format
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Valid version format: $TAG"
          else
            echo "ERROR: Invalid version format: $TAG"
            echo "Expected formats: vX.X.X (stable) or vX.X.X-beta.X (beta)"
            exit 1
          fi

      - name: Extract version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Verify tag matches package.json
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="${{ steps.version.outputs.VERSION }}"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "ERROR: Tag ($TAG) does not match package.json version ($PKG_VERSION)"
            echo "Expected tag: $EXPECTED_TAG"
            exit 1
          fi
          echo "Tag matches package.json version: $TAG"

      - name: Verify changelog exists
        if: github.ref_type == 'tag'
        id: changelog
        run: |
          CHANGELOG_FILE="changelog/${{ github.ref_name }}.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "ERROR: Changelog file not found: $CHANGELOG_FILE"
            echo "Please create the changelog file before creating a release."
            exit 1
          fi
          echo "Changelog file found: $CHANGELOG_FILE"
          echo "CHANGELOG_PATH=$CHANGELOG_FILE" >> $GITHUB_OUTPUT

      - name: Determine release type
        id: release_type
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -beta\. ]]; then
            echo "IS_BETA=true" >> $GITHUB_OUTPUT
            echo "CHANNEL_TAG=beta" >> $GITHUB_OUTPUT
          else
            echo "IS_BETA=false" >> $GITHUB_OUTPUT
            echo "CHANNEL_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile

      - name: Dependency security audit
        run: |
          corepack enable
          pnpm audit --audit-level=high || true
        continue-on-error: true

      - name: TypeScript compile check
        run: |
          corepack enable
          pnpm exec tsc --noEmit
        working-directory: ./

  build:
    name: Build Production
    needs: [validate]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile

      - name: Production build
        run: |
          corepack enable
          pnpm run build:prod

      - name: Generate dist integrity checksum
        run: |
          cd dist
          find . -type f | sort | xargs sha256sum > ../dist-sha256sum.txt
          cd ..
          cat dist-sha256sum.txt

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4 # ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Upload dist checksum artifact
        uses: actions/upload-artifact@v4 # ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-checksum
          path: dist-sha256sum.txt
          retention-days: 1

  build-amd64:
    name: Build AMD64
    needs: [validate, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download dist artifact
        uses: actions/download-artifact@v4 # d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      - name: Download dist checksum artifact
        uses: actions/download-artifact@v4 # d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist-checksum
          path: .

      - name: Verify dist integrity
        run: |
          cd dist
          sha256sum -c ../dist-sha256sum.txt
          cd ..

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3 # 8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build image locally
        uses: docker/build-push-action@v6 # 10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: crowdsec-monitor-api:${{ needs.validate.outputs.version }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.source=https://github.com/JGeek00/crowdsec-monitor-api

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0 # a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: "crowdsec-monitor-api:${{ needs.validate.outputs.version }}-amd64"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Export image
        run: |
          docker save crowdsec-monitor-api:${{ needs.validate.outputs.version }}-amd64 > image-amd64.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4 # ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-amd64
          path: image-amd64.tar
          retention-days: 1

  build-arm64:
    name: Build ARM64
    needs: [validate, build]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download dist artifact
        uses: actions/download-artifact@v4 # d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      - name: Download dist checksum artifact
        uses: actions/download-artifact@v4 # d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist-checksum
          path: .

      - name: Verify dist integrity
        run: |
          cd dist
          sha256sum -c ../dist-sha256sum.txt
          cd ..

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3 # 8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build image locally
        uses: docker/build-push-action@v6 # 10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          platforms: linux/arm64
          tags: crowdsec-monitor-api:${{ needs.validate.outputs.version }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.source=https://github.com/JGeek00/crowdsec-monitor-api

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0 # a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: "crowdsec-monitor-api:${{ needs.validate.outputs.version }}-arm64"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Export image
        run: |
          docker save crowdsec-monitor-api:${{ needs.validate.outputs.version }}-arm64 > image-arm64.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4 # ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-arm64
          path: image-arm64.tar
          retention-days: 1

  manifest:
    name: Create Manifest
    needs: [validate, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4 # d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: image-*
          path: ./images
          merge-multiple: false

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Docker login
        uses: docker/login-action@v3 # c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Push arch images to GHCR
        run: |
          REPO="ghcr.io/jgeek00/crowdsec-monitor-api"
          VERSION="${{ needs.validate.outputs.version }}"

          skopeo copy --dest-creds "${{ github.actor }}:${{ secrets.GH_TOKEN }}" \
            "docker-archive:./images/image-amd64/image-amd64.tar" \
            "docker://${REPO}:${VERSION}-amd64"

          skopeo copy --dest-creds "${{ github.actor }}:${{ secrets.GH_TOKEN }}" \
            "docker-archive:./images/image-arm64/image-arm64.tar" \
            "docker://${REPO}:${VERSION}-arm64"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3 # 8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Create and push manifests
        run: |
          REPO="ghcr.io/jgeek00/crowdsec-monitor-api"
          VERSION="${{ needs.validate.outputs.version }}"
          CHANNEL="${{ needs.validate.outputs.channel_tag }}"

          docker buildx imagetools create \
            -t "${REPO}:${VERSION}" \
            "${REPO}:${VERSION}-amd64" \
            "${REPO}:${VERSION}-arm64"

          docker buildx imagetools create \
            -t "${REPO}:${CHANNEL}" \
            "${REPO}:${VERSION}-amd64" \
            "${REPO}:${VERSION}-arm64"

      - name: Delete arch tags
        run: |
          REPO="ghcr.io/jgeek00/crowdsec-monitor-api"
          VERSION="${{ needs.validate.outputs.version }}"

          VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/crowdsec-monitor-api/versions")

          for ARCH in "${VERSION}-amd64" "${VERSION}-arm64"; do
            VERSION_ID=$(echo "$VERSIONS" | jq -r ".[] | select(.metadata.container.tags[] == \"$ARCH\") | .id")
            if [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "null" ]; then
              curl -s -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/user/packages/container/crowdsec-monitor-api/versions/${VERSION_ID}"
              echo "Deleted arch tag: $ARCH (version id: $VERSION_ID)"
            else
              echo "WARNING: Could not find version id for tag: $ARCH"
            fi
          done

  release:
    name: GitHub Release
    needs: [validate, manifest]
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Checkout
        uses: actions/checkout@v4 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # 3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ needs.validate.outputs.changelog_path }}
          prerelease: ${{ needs.validate.outputs.is_beta == 'true' }}
          token: ${{ secrets.GH_TOKEN }}

  cleanup-success:
    name: Cleanup Success
    needs: [validate, manifest, release]
    runs-on: ubuntu-24.04
    if: success()
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Delete GitHub Artifacts
        uses: actions/github-script@v7 # f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'dist' || artifact.name === 'dist-checksum' ||
                  artifact.name === 'image-amd64' || artifact.name === 'image-arm64') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted artifact: ${artifact.name} (id: ${artifact.id})`);
              }
            }

  cleanup-failure-partial:
    name: Cleanup Failure (One Arch Failed)
    needs: [validate, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    if: >-
      always() &&
      (needs.build-amd64.result == 'failure' || needs.build-arm64.result == 'failure') &&
      (needs.build-amd64.result == 'success' || needs.build-arm64.result == 'success')
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Delete GitHub Artifacts
        uses: actions/github-script@v7 # f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'dist' || artifact.name === 'dist-checksum' ||
                  artifact.name === 'image-amd64' || artifact.name === 'image-arm64') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted artifact: ${artifact.name} (id: ${artifact.id})`);
              }
            }

  cleanup-failure-both:
    name: Cleanup Failure (Both Failed)
    needs: [validate, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    if: >-
      always() &&
      needs.build-amd64.result == 'failure' &&
      needs.build-arm64.result == 'failure'
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Delete GitHub Artifacts
        uses: actions/github-script@v7 # f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'dist' || artifact.name === 'dist-checksum' ||
                  artifact.name === 'image-amd64' || artifact.name === 'image-arm64') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted artifact: ${artifact.name} (id: ${artifact.id})`);
              }
            }
