name: Beta Release

on:
  pull_request:
    types: [closed]
    branches:
      - "release/**"

permissions:
  contents: write

jobs:
  bump-beta:
    name: Bump Beta Version
    runs-on: ubuntu-24.04
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from target branch
        id: version
        run: |
          TARGET="${{ github.event.pull_request.base.ref }}"
          BASE_VERSION=$(echo "$TARGET" | sed 's|^release/||')

          if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version in branch name '$TARGET'"
            echo "Expected format: release/X.X.X"
            exit 1
          fi

          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $BASE_VERSION"

      - name: Extract changelog from PR body
        id: changelog
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          if [ -z "$PR_BODY" ]; then
            echo "ERROR: PR body is empty. A changelog is required."
            exit 1
          fi

          CHANGELOG=$(echo "$PR_BODY" | sed -n '/^```$/,/^```$/p' | tail -n +1 | head -n -1)

          if [ -z "$CHANGELOG" ]; then
            echo "ERROR: No changelog found in PR body (content between \`\`\` markers)."
            exit 1
          fi

          TEMP_FILE=$(mktemp)
          echo "$CHANGELOG" > "$TEMP_FILE"
          echo "CHANGELOG_FILE=$TEMP_FILE" >> $GITHUB_OUTPUT

          echo "Extracted changelog:"
          cat "$TEMP_FILE"

      - name: Determine next beta number
        id: beta
        run: |
          BASE_VERSION="${{ steps.version.outputs.BASE_VERSION }}"

          git fetch --tags

          BETA_COUNT=$(git tag -l "v${BASE_VERSION}-beta.*" | sort -V | wc -l)
          NEXT_BETA=$((BETA_COUNT + 1))
          NEW_VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"

          echo "NEXT_BETA=$NEXT_BETA" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Existing beta count: $BETA_COUNT"
          echo "New version: $NEW_VERSION"

      - name: Update package.json
        run: |
          NEW_VERSION="${{ steps.beta.outputs.NEW_VERSION }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const old = pkg.version;
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json: ' + old + ' -> ' + pkg.version);
          "

      - name: Commit and tag with changelog
        run: |
          NEW_VERSION="${{ steps.beta.outputs.NEW_VERSION }}"
          CHANGELOG_FILE="${{ steps.changelog.outputs.CHANGELOG_FILE }}"
          CHANGELOG=$(cat "$CHANGELOG_FILE")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          git commit -m "${NEW_VERSION}

          $CHANGELOG"
          git tag "v${NEW_VERSION}"

          echo "Commit created:"
          git log -1 --format="%H %s"
          git log -1 --format="%B"

       - name: Push commit and tag
        run: |
          TARGET="${{ github.event.pull_request.base.ref }}"
          NEW_VERSION="${{ steps.beta.outputs.NEW_VERSION }}"

          git push origin HEAD:"$TARGET"
          git push origin "v${NEW_VERSION}"

          echo "Pushed commit and tag v${NEW_VERSION} to branch $TARGET"

      - name: Delete source branch
        run: |
          SOURCE="${{ github.event.pull_request.head.ref }}"
          git push origin --delete "$SOURCE"
          echo "Deleted source branch: $SOURCE"
