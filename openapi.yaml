openapi: 3.0.3
info:
  title: CrowdSec Monitor API
  description: |
    REST API to monitor and query data from CrowdSec LAPI (Local API).
    
    The API provides persistent storage and query interface for CrowdSec security alerts and decisions,
    automatically syncing data from your CrowdSec LAPI instance and storing it in a local SQLite or
    PostgreSQL database (configurable via the `DB_MODE` environment variable).
    
    ## Authentication
    
    API authentication is **optional** and controlled by the `API_PASSWORD` environment variable:
    - If `API_PASSWORD` is not set: All endpoints are accessible without authentication
    - If `API_PASSWORD` is set: Protected endpoints require Bearer token authentication
    
    Protected endpoints:
    - All `/alerts/*` endpoints
    - All `/decisions/*` endpoints
    - `/status` endpoint
    
    Public endpoints:
    - `/health` (always accessible)
  version: 1.0.0
  contact:
    name: JGeek00
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://your-domain.com/api/v1
    description: Production server

security:
  - BearerAuth: []
  - {}

tags:
  - name: Health
    description: API health and status checks
  - name: Alerts
    description: CrowdSec security alerts operations
  - name: Decisions
    description: CrowdSec security decisions operations
  - name: Allowlists
    description: CrowdSec allowlists operations
  - name: Blocklists
    description: Imported blocklists from CrowdSec LAPI (origins blocklist-import and lists)
  - name: Statistics
    description: Statistics and aggregated data operations

paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      operationId: healthCheck
      description: Returns API status and current timestamp. Always accessible without authentication.
      security: []
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API is running
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-02-14T10:30:45.123Z'

  /status:
    get:
      tags:
        - Health
      summary: Get comprehensive status information
      operationId: getStatus
      description: |
        Returns CrowdSec LAPI connection status, bouncer availability, last successful data sync,
        API version, and active background processes. Requires authentication if API_PASSWORD is configured.

        For real-time updates, connect to the WebSocket at `ws://<host>/api/v1/status`.
        On connect the full snapshot is sent; subsequent messages are pushed whenever any field changes.
      responses:
        '200':
          description: Status information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  csLapi:
                    type: object
                    properties:
                      lapiConnected:
                        type: boolean
                        example: true
                      lastSuccessfulSync:
                        type: string
                        format: date-time
                        nullable: true
                        example: '2026-02-14T10:25:30.123Z'
                      timestamp:
                        type: string
                        format: date-time
                        example: '2026-02-14T10:30:45.123Z'
                  csBouncer:
                    type: object
                    properties:
                      available:
                        type: boolean
                        description: Whether the bouncer API key is valid and CrowdSec LAPI is reachable for blocklist operations
                        example: true
                  csMonitorApi:
                    type: object
                    properties:
                      version:
                        type: string
                        example: '1.0.0'
                      newVersionAvailable:
                        type: string
                        nullable: true
                        example: null
                  processes:
                    type: array
                    description: Active and recently completed background processes
                    items:
                      $ref: '#/components/schemas/Process'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error

  /check-credentials:
    get:
      tags:
        - Health
      summary: Check credentials
      operationId: checkCredentials
      description: Validate that the provided credentials are accepted by the API. Requires authentication if API_PASSWORD is configured.
      responses:
        '200':
          description: Credentials are valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Credentials are valid
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-02-14T10:30:45.123Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /alerts:
    get:
      tags:
        - Alerts
      summary: List all alerts
      operationId: listAlerts
      description: Retrieve all alerts with optional filtering and pagination
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Unpaged'
        - name: scenario
          in: query
          description: Filter by scenario name (partial match, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example: ssh-bf
        - name: simulated
          in: query
          description: Filter by simulated status
          schema:
            type: boolean
        - name: ip_address
          in: query
          description: Filter by source IP address (accepts multiple IPv4/IPv6 addresses)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example: 192.168.1.100
        - name: country
          in: query
          description: Filter by source country (2-letter ISO code, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example: US
        - name: ip_owner
          in: query
          description: Filter by IP owner/organization name (partial match, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example: Amazon
        - name: target
          in: query
          description: Filter by target FQDN (accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example: api.example.com
      responses:
        '200':
          description: List of alerts
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AlertListPaginated'
                  - $ref: '#/components/schemas/AlertListUnpaged'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /alerts/{id}:
    get:
      tags:
        - Alerts
      summary: Get alert by ID
      operationId: getAlertById
      description: Retrieve a single alert by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Alert ID
          schema:
            type: integer
      responses:
        '200':
          description: Alert details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Alert not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
                  message:
                    type: string
                    example: Alert not found
    delete:
      tags:
        - Alerts
      summary: Delete alert by ID
      operationId: deleteAlertById
      description: |
        Delete an alert from CrowdSec LAPI (including all associated decisions).
        The alert is immediately deleted from the local database, then the API syncs with LAPI.
      parameters:
        - name: id
          in: path
          required: true
          description: Alert ID to delete
          schema:
            type: integer
      responses:
        '200':
          description: Alert deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Alert deleted successfully
                  nbDeleted:
                    type: string
                    example: '1'
        '400':
          description: Invalid alert ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Alert not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /alerts/stats:
    get:
      tags:
        - Alerts
      summary: Get alerts statistics
      operationId: getAlertStats
      description: Get aggregated statistics about alerts
      responses:
        '200':
          description: Alert statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertStats'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /decisions:
    get:
      tags:
        - Decisions
      summary: List all decisions
      operationId: listDecisions
      description: Retrieve all decisions with optional filtering and pagination
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Unpaged'
        - name: only_active
          in: query
          description: Filter only active decisions (expiration date is in the future)
          schema:
            type: boolean
        - name: type
          in: query
          description: Filter by decision type
          schema:
            type: string
            enum: [ban, captcha, throttle, allow]
        - name: scope
          in: query
          description: Filter by scope
          schema:
            type: string
            example: Ip
        - name: value
          in: query
          description: Filter by value (IP address, range, etc.)
          schema:
            type: string
        - name: simulated
          in: query
          description: Filter by simulated status
          schema:
            type: boolean
        - name: scenario
          in: query
          description: Filter by scenario name (partial match, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: ip_address
          in: query
          description: Filter by IP address (accepts multiple IPv4/IPv6 addresses)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: country
          in: query
          description: Filter by country from related alert (2-letter ISO code, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: ip_owner
          in: query
          description: Filter by IP owner from related alert (partial match, accepts multiple values)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
      responses:
        '200':
          description: List of decisions
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DecisionListPaginated'
                  - $ref: '#/components/schemas/DecisionListUnpaged'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Decisions
      summary: Create a decision
      operationId: createDecision
      description: |
        Create a decision in CrowdSec LAPI. This is a simplified endpoint that creates an alert with a decision.
        After successful creation, the API automatically syncs the local database with LAPI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ip
                - duration
                - reason
                - type
              properties:
                ip:
                  type: string
                  description: IPv4 or IPv6 address to apply the decision to
                  example: 192.168.100.200
                duration:
                  type: string
                  description: 'Duration format: days(d), hours(h), minutes(m) - can be combined (e.g., 15m, 4h, 1d, 1d4h15m, 4h15m)'
                  example: 1h
                reason:
                  type: string
                  description: Human-readable reason for the decision
                  example: Manual ban from API
                type:
                  type: string
                  enum: [ban, captcha, throttle, allow]
                  description: Decision type
                  example: ban
      responses:
        '201':
          description: Decision created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Decision created successfully
                  alert_ids:
                    type: array
                    items:
                      type: string
                    example: ['12345']
                  decision:
                    type: object
                    properties:
                      ip:
                        type: string
                        example: 192.168.100.200
                      type:
                        type: string
                        example: ban
                      duration:
                        type: string
                        example: 1h
                      reason:
                        type: string
                        example: Manual ban from API
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /decisions/{id}:
    get:
      tags:
        - Decisions
      summary: Get decision by ID
      operationId: getDecisionById
      description: Retrieve a single decision by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Decision ID
          schema:
            type: integer
      responses:
        '200':
          description: Decision details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Decision'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Decision not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Decisions
      summary: Delete decision by ID
      operationId: deleteDecisionById
      description: |
        Delete a decision from CrowdSec LAPI. The associated alert is NOT deleted.
        In the local database, the decision expiration date is set to the current time (not deleted).
        After deletion, the API automatically syncs with LAPI.
      parameters:
        - name: id
          in: path
          required: true
          description: Decision ID to delete
          schema:
            type: integer
      responses:
        '200':
          description: Decision deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Decision deleted successfully
                  nbDeleted:
                    type: string
                    example: '1'
        '400':
          description: Invalid decision ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Decision not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /decisions/stats:
    get:
      tags:
        - Decisions
      summary: Get decisions statistics
      operationId: getDecisionStats
      description: Get aggregated statistics about decisions
      responses:
        '200':
          description: Decision statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionStats'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /allowlists:
    get:
      tags:
        - Allowlists
      summary: List all allowlists
      operationId: listAllowlists
      description: Retrieve all allowlists from CrowdSec LAPI with their items
      responses:
        '200':
          description: List of allowlists
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Allowlist'
                  length:
                    type: integer
                    description: Number of allowlists returned
                    example: 3
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error

  /allowlists/check:
    post:
      tags:
        - Allowlists
      summary: Check if IPs are in any allowlist
      operationId: checkAllowlistIps
      description: Check if provided IP addresses are present in any allowlist and return their allowlist membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ips:
                  type: array
                  items:
                    type: string
                    format: ipv4 or ipv6
                  description: Array of IP addresses to check
                  example:
                    - "1.1.1.1"
                    - "1.0.0.1"
                    - "2.2.2.2"
              required:
                - ips
      responses:
        '200':
          description: Allowlist check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        ip:
                          type: string
                          format: ipv4 or ipv6
                          description: The IP address checked
                          example: "1.1.1.1"
                        allowlist:
                          type: string
                          nullable: true
                          description: Name of the allowlist if IP is whitelisted, null otherwise
                          example: "known_ips"
                    description: Array of IPs with their allowlist status
                example:
                  results:
                    - ip: "1.1.1.1"
                      allowlist: "known_ips"
                    - ip: "1.0.0.1"
                      allowlist: "known_ips"
                    - ip: "2.2.2.2"
                      allowlist: null
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error

  /allowlists/{allowlist_name}:
    get:
      tags:
        - Allowlists
      summary: Get specific allowlist
      operationId: getAllowlistByName
      description: Retrieve a specific allowlist from CrowdSec LAPI by its name
      parameters:
        - name: allowlist_name
          in: path
          required: true
          description: The name of the allowlist to retrieve
          schema:
            type: string
          example: known_ips
      responses:
        '200':
          description: Allowlist details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Allowlist'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Allowlist not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /blocklists:
    get:
      tags:
        - Blocklists
      summary: List all blocklists
      operationId: listBlocklists
      description: |
        Retrieve all blocklists (both API-managed and CrowdSec-managed) stored in the local database.
        API-managed lists are returned first, followed by CrowdSec-managed lists.
        Each item includes a `type` field: `api` for API-managed, `cs` for CrowdSec-managed.
        API-managed lists are synced at a configurable interval; CrowdSec-managed lists are synced
        from `GET /v1/alerts?has_active_decision=true&origin=lists` on startup and every hour.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Unpaged'
        - name: include_ips
          in: query
          description: |
            Controls whether `blocklistIps` is included in each entry.
            - `full`: include full IP objects
            - `ip_string`: include plain IP/range strings
            - Omit to exclude `blocklistIps` entirely.
          schema:
            type: string
            enum: [full, ip_string]
          example: full
        - name: get_only
          in: query
          description: |
            Filter by blocklist type.
            - `blocklists`: return only API-managed lists
            - `cs_blocklists`: return only CrowdSec-managed lists
            - Omit to return both types.
          schema:
            type: string
            enum: [blocklists, cs_blocklists]
          example: blocklists
      responses:
        '200':
          description: List of blocklists
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Blocklist'
                  pagination:
                    type: object
                    description: Present when paginated (unpaged=false)
                    properties:
                      page:
                        type: integer
                        description: Current page number
                        example: 1
                      amount:
                        type: integer
                        description: Number of items in current response
                        example: 5
                      total:
                        type: integer
                        description: Total number of blocklists in the database
                        example: 5
                  total:
                    type: integer
                    description: Total number of blocklists (present when unpaged=true)
                    example: 5
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error
    post:
      tags:
        - Blocklists
      summary: Add a new blocklist
      operationId: createBlocklist
      description: |
        Add a new API-managed blocklist by URL. The entry is created in the database immediately
        and the response is returned. The initial IP fetch and push to CrowdSec happen in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, name]
              properties:
                url:
                  type: string
                  description: URL of the blocklist file
                  example: https://example.com/blocklist.txt
                name:
                  type: string
                  description: Display name for the blocklist
                  example: My Blocklist
      responses:
        '201':
          description: Blocklist created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Blocklist'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: A blocklist with this URL already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /blocklists/{id}:
    get:
      tags:
        - Blocklists
      summary: Get a specific blocklist
      operationId: getBlocklistById
      description: |
        Retrieve a single blocklist by its ID. Looks up API-managed blocklists first, then
        CrowdSec-managed blocklists. Returns only metadata and `count_ips` by default.
        Pass `include_ips=full` to include the full `blocklistIps` array, or `include_ips=ip_string` to get plain IP strings.
        For large blocklists consider using `GET /blocklists/{blocklistId}/ips` instead, which supports pagination.
      parameters:
        - name: id
          in: path
          required: true
          description: The numeric ID of the blocklist
          schema:
            type: integer
          example: 1
        - name: include_ips
          in: query
          description: |
            Controls whether `blocklistIps` is included in the response.
            - `full`: include full IP objects
            - `ip_string`: include plain IP/range strings
            - Omit to exclude `blocklistIps` entirely.
          schema:
            type: string
            enum: [full, ip_string]
          example: full
      responses:
        '200':
          description: Blocklist details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/Blocklist'
                      - $ref: '#/components/schemas/BlocklistWithIps'
                      - $ref: '#/components/schemas/BlocklistWithIpStrings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Blocklist not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
    delete:
      tags:
        - Blocklists
      summary: Delete a blocklist
      operationId: deleteBlocklist
      description: |
        Delete an API-managed blocklist by ID. The entry and its IPs are removed from the local
        database immediately (IPs via CASCADE) and the response is returned.
        The removal of associated alerts from CrowdSec LAPI happens asynchronously in the background.
      parameters:
        - name: id
          in: path
          required: true
          description: The numeric ID of the blocklist to delete
          schema:
            type: integer
          example: 3
      responses:
        '202':
          description: Blocklist deletion accepted — removed from DB, CrowdSec cleanup in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Blocklist deletion requested
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Blocklist not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /blocklists/{blocklistId}/ips:
    get:
      tags:
        - Blocklists
      summary: Get paginated IPs for a blocklist
      operationId: getBlocklistIps
      description: |
        Retrieve blocked IPs/ranges for a specific blocklist with pagination support.
        This is the recommended endpoint for large blocklists instead of `expand_ips=true`.
        Returns results ordered by `id` ascending.
      parameters:
        - name: blocklistId
          in: path
          required: true
          description: The numeric ID of the blocklist
          schema:
            type: integer
          example: 8
        - name: limit
          in: query
          description: Number of items to return (must be positive)
          schema:
            type: integer
            minimum: 1
            default: 50
        - name: offset
          in: query
          description: Starting index (must be non-negative)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: unpaged
          in: query
          description: Disable pagination and return all results. Use with caution on large blocklists.
          schema:
            type: boolean
            default: false
        - name: ip_string
          in: query
          description: When `true`, `data` is returned as an array of plain IP/range strings instead of full objects.
          schema:
            type: boolean
            default: false
          example: true
      responses:
        '200':
          description: Paginated list of blocked IPs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    oneOf:
                      - type: array
                        description: Full IP objects (default)
                        items:
                          $ref: '#/components/schemas/BlocklistIp'
                      - type: array
                        description: Plain IP/range strings (when ip_string=true)
                        items:
                          type: string
                          example: '1.10.16.0/20'
                  pagination:
                    type: object
                    description: Present when paginated (unpaged=false)
                    properties:
                      page:
                        type: integer
                        description: Current page number
                        example: 1
                      amount:
                        type: integer
                        description: Number of items in current response
                        example: 50
                      total:
                        type: integer
                        description: Total number of IPs in this blocklist
                        example: 48568
                  total:
                    type: integer
                    description: Total number of IPs (present when unpaged=true)
                    example: 48568
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Blocklist not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /blocklists/check:
    post:
      tags:
        - Blocklists
      summary: Check if IPs are in any blocklist
      operationId: checkBlocklistIps
      description: Check if provided IP addresses are present in any locally stored blocklist (both API-managed and CrowdSec-managed) and return their blocklist membership. Each IP can match multiple blocklists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ips
              properties:
                ips:
                  type: array
                  items:
                    type: string
                    description: IPv4 or IPv6 address
                  description: Array of IP addresses to check
                  example:
                    - "1.1.1.1"
                    - "5.188.206.14"
                    - "2.2.2.2"
      responses:
        '200':
          description: Blocklist check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        ip:
                          type: string
                          description: The IP address checked
                          example: "5.188.206.14"
                        blocklists:
                          type: array
                          items:
                            type: string
                          description: Array of blocklist names the IP is listed in. Empty array if not in any blocklist
                          example: ["firehol_cruzit_web_attacks", "my_blocklist"]
              example:
                results:
                  - ip: "1.1.1.1"
                    blocklists: []
                  - ip: "5.188.206.14"
                    blocklists: ["firehol_cruzit_web_attacks"]
                  - ip: "2.2.2.2"
                    blocklists: []
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal server error

  /blocklists/check-domain:
    post:
      tags:
        - Blocklists
      summary: Resolve a domain and check its IPs against blocklists
      operationId: checkDomainBlocklist
      description: |
        Resolves the given domain to its IPv4 and IPv6 addresses via DNS and checks
        whether any resolved IP is present in any locally stored blocklist.
        Uses the DNS server configured via the `DNS_SERVER` environment variable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domain
              properties:
                domain:
                  type: string
                  maxLength: 253
                  description: Domain name to resolve. Subdomains are allowed.
                  example: github.com
      responses:
        '200':
          description: DNS resolution and blocklist check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                    description: The domain that was checked
                    example: github.com
                  ips:
                    type: array
                    description: Resolved IP addresses with their blocklist membership
                    items:
                      type: object
                      properties:
                        ip:
                          type: string
                          description: Resolved IP address
                          example: "140.82.121.4"
                        blocklists:
                          type: array
                          items:
                            type: string
                          description: Array of blocklist names the IP is listed in. Empty array if not in any blocklist
                          example: []
              example:
                domain: github.com
                ips:
                  - ip: "140.82.121.4"
                    blocklists: []
                  - ip: "140.82.121.3"
                    blocklists: []
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: Domain could not be resolved to any IP address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /statistics:
    get:
      tags:
        - Statistics
      summary: Get comprehensive statistics
      operationId: getStatistics
      description: Get comprehensive statistics including alerts in the last 24 hours, active decisions, activity history, and top items (countries, scenarios, IP owners, and targets)
      parameters:
        - name: since
          in: query
          description: Filter data from this date (format yyyy-mm-dd, must be a past date)
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-02-13'
        - name: amount
          in: query
          description: Number of top items to return for each category
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Comprehensive statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComprehensiveStatistics'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/countries:
    get:
      tags:
        - Statistics
      summary: Get countries statistics
      operationId: listCountriesStats
      description: Get complete list of all countries with alert counts, sorted by count (descending)
      responses:
        '200':
          description: List of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountryStatItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/countries/{item}:
    get:
      tags:
        - Statistics
      summary: Get country history
      operationId: getCountryHistory
      description: Get historical activity for a specific country, showing alert counts grouped by date
      parameters:
        - name: item
          in: path
          required: true
          description: Country code (2-letter ISO, case insensitive)
          schema:
            type: string
          example: us
      responses:
        '200':
          description: Country history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/scenarios:
    get:
      tags:
        - Statistics
      summary: Get scenarios statistics
      operationId: listScenariosStats
      description: Get complete list of all scenarios with alert counts, sorted by count (descending)
      responses:
        '200':
          description: List of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScenarioStatItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/scenarios/{item}:
    get:
      tags:
        - Statistics
      summary: Get scenario history
      operationId: getScenarioHistory
      description: Get historical activity for a specific scenario, showing alert counts grouped by date
      parameters:
        - name: item
          in: path
          required: true
          description: Scenario name (exact match, URL-encode if needed)
          schema:
            type: string
          example: crowdsecurity/ssh-bruteforce
      responses:
        '200':
          description: Scenario history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/ip-owners:
    get:
      tags:
        - Statistics
      summary: Get IP owners statistics
      operationId: listIpOwnersStats
      description: Get complete list of all IP owners (AS names) with alert counts, sorted by count (descending)
      responses:
        '200':
          description: List of IP owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IpOwnerStatItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/ip-owners/{item}:
    get:
      tags:
        - Statistics
      summary: Get IP owner history
      operationId: getIpOwnerHistory
      description: Get historical activity for a specific IP owner, showing alert counts grouped by date
      parameters:
        - name: item
          in: path
          required: true
          description: IP owner/AS name (exact match, URL-encode if needed)
          schema:
            type: string
          example: Amazon.com, Inc.
      responses:
        '200':
          description: IP owner history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/targets:
    get:
      tags:
        - Statistics
      summary: Get targets statistics
      operationId: listTargetsStats
      description: Get complete list of all target FQDNs (from target_fqdn in events metadata) with alert counts, sorted by count (descending)
      responses:
        '200':
          description: List of targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TargetStatItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /statistics/targets/{item}:
    get:
      tags:
        - Statistics
      summary: Get target history
      operationId: getTargetHistory
      description: Get historical activity for a specific target FQDN, showing alert counts grouped by date
      parameters:
        - name: item
          in: path
          required: true
          description: Target FQDN (exact match, URL-encode if needed)
          schema:
            type: string
          example: example.com
      responses:
        '200':
          description: Target history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryItem'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication (optional).
        Only required if `API_PASSWORD` environment variable is configured.
        Use the value of `API_PASSWORD` as the bearer token.

  parameters:
    Limit:
      name: limit
      in: query
      description: Number of items to return (must be positive)
      schema:
        type: integer
        minimum: 1
        default: 100
    Offset:
      name: offset
      in: query
      description: Starting index (must be non-negative)
      schema:
        type: integer
        minimum: 0
        default: 0
    Unpaged:
      name: unpaged
      in: query
      description: Disable pagination and return all results
      schema:
        type: boolean
        default: false

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Short error category or title
          example: Not found
        message:
          type: string
          description: Detailed error description
          example: The requested resource was not found

    Alert:
      type: object
      properties:
        id:
          type: integer
          description: Alert ID (from CrowdSec)
        uuid:
          type: string
          format: uuid
        scenario:
          type: string
          example: crowdsecurity/ssh-bf
        scenario_version:
          type: string
        scenario_hash:
          type: string
        message:
          type: string
        capacity:
          type: integer
        leakspeed:
          type: string
        simulated:
          type: boolean
        remediation:
          type: boolean
        events_count:
          type: integer
        machine_id:
          type: string
        source:
          $ref: '#/components/schemas/SourceInfo'
        labels:
          type: array
          items:
            type: string
        meta:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: array
                items:
                  type: string
                description: Array of string values (always returned as array, even for single values)
        events:
          type: array
          items:
            type: object
        crowdsec_created_at:
          type: string
          format: date-time
        start_at:
          type: string
          format: date-time
        stop_at:
          type: string
          format: date-time

    SourceInfo:
      type: object
      properties:
        as_name:
          type: string
        as_number:
          type: string
        cn:
          type: string
          description: Country code (2-letter ISO)
        ip:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        range:
          type: string
        scope:
          type: string
        value:
          type: string

    Decision:
      type: object
      properties:
        id:
          type: integer
          description: Decision ID (from CrowdSec)
        alert_id:
          type: integer
        origin:
          type: string
        type:
          type: string
          enum: [ban, captcha, throttle, allow]
        scope:
          type: string
        value:
          type: string
        expiration:
          type: string
          format: date-time
        scenario:
          type: string
        simulated:
          type: boolean
        source:
          $ref: '#/components/schemas/SourceInfo'
        crowdsec_created_at:
          type: string
          format: date-time
          description: Creation timestamp from CrowdSec

    AlertListPaginated:
      type: object
      properties:
        filtering:
          type: object
          description: Available filtering options from entire database
          properties:
            countries:
              type: array
              items:
                type: string
              description: Unique country codes available
              example: ["CN", "ES", "RU", "US"]
            scenarios:
              type: array
              items:
                type: string
              description: Unique scenarios available
              example: ["crowdsecurity/http-bad-user-agent", "crowdsecurity/ssh-bf"]
            ipOwners:
              type: array
              items:
                type: string
              description: Unique IP owners/organizations available
              example: ["Amazon.com, Inc.", "Google LLC", "MICROSOFT-CORP-MSN-AS-BLOCK"]
            targets:
              type: array
              items:
                type: string
              description: Unique target FQDNs available
              example: ["adguard.jgeek00.com", "api.example.com", "ha.jgeek00.com"]
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        pagination:
          type: object
          properties:
            page:
              type: integer
              description: Current page number
            amount:
              type: integer
              description: Number of items in current response
            total:
              type: integer
              description: Total number of items available

    AlertListUnpaged:
      type: object
      properties:
        filtering:
          type: object
          description: Available filtering options from entire database
          properties:
            countries:
              type: array
              items:
                type: string
              description: Unique country codes available
              example: ["CN", "ES", "RU", "US"]
            scenarios:
              type: array
              items:
                type: string
              description: Unique scenarios available
              example: ["crowdsecurity/http-bad-user-agent", "crowdsecurity/ssh-bf"]
            ipOwners:
              type: array
              items:
                type: string
              description: Unique IP owners/organizations available
              example: ["Amazon.com, Inc.", "Google LLC", "MICROSOFT-CORP-MSN-AS-BLOCK"]
            targets:
              type: array
              items:
                type: string
              description: Unique target FQDNs available
              example: ["adguard.jgeek00.com", "api.example.com", "ha.jgeek00.com"]
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        total:
          type: integer
          description: Total number of items

    AlertStats:
      type: object
      properties:
        total:
          type: integer
          example: 150
        simulated:
          type: integer
          example: 25
        real:
          type: integer
          example: 125
        topScenarios:
          type: array
          items:
            type: object
            properties:
              scenario:
                type: string
                example: crowdsecurity/ssh-bf
              count:
                type: integer
                example: 45
        topCountries:
          type: array
          items:
            type: object
            properties:
              country:
                type: string
                example: CN
              count:
                type: integer
                example: 35
        topOrganizations:
          type: array
          items:
            type: object
            properties:
              organization:
                type: string
                example: Alibaba Cloud
              count:
                type: integer
                example: 18

    DecisionListPaginated:
      type: object
      properties:
        filtering:
          type: object
          description: Available filtering options from entire database
          properties:
            countries:
              type: array
              items:
                type: string
              description: Unique country codes available
              example: ["CN", "ES", "RU", "US"]
            ipOwners:
              type: array
              items:
                type: string
              description: Unique IP owners/organizations available
              example: ["Amazon.com, Inc.", "Google LLC", "MICROSOFT-CORP-MSN-AS-BLOCK"]
        items:
          type: array
          items:
            $ref: '#/components/schemas/Decision'
        pagination:
          type: object
          properties:
            page:
              type: integer
            amount:
              type: integer
            total:
              type: integer

    DecisionListUnpaged:
      type: object
      properties:
        filtering:
          type: object
          description: Available filtering options from entire database
          properties:
            countries:
              type: array
              items:
                type: string
              description: Unique country codes available
              example: ["CN", "ES", "RU", "US"]
            ipOwners:
              type: array
              items:
                type: string
              description: Unique IP owners/organizations available
              example: ["Amazon.com, Inc.", "Google LLC", "MICROSOFT-CORP-MSN-AS-BLOCK"]
        items:
          type: array
          items:
            $ref: '#/components/schemas/Decision'
        total:
          type: integer

    DecisionStats:
      type: object
      properties:
        total:
          type: integer
          example: 75
        byType:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: ban
              count:
                type: integer
                example: 65
        byScope:
          type: array
          items:
            type: object
            properties:
              scope:
                type: string
                example: Ip
              count:
                type: integer
                example: 70

    ComprehensiveStatistics:
      type: object
      properties:
        alertsLast24Hours:
          type: integer
          description: Number of alerts in the last 24 hours
          example: 45
        activeDecisions:
          type: integer
          description: Number of decisions that haven't expired yet
          example: 32
        activityHistory:
          type: array
          description: Daily activity grouped by date
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: '2026-02-14'
              amountAlerts:
                type: integer
                example: 30
              amountDecisions:
                type: integer
                example: 22
        topCountries:
          type: array
          items:
            $ref: '#/components/schemas/CountryStatItem'
        topScenarios:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioStatItem'
        topIpOwners:
          type: array
          items:
            $ref: '#/components/schemas/IpOwnerStatItem'
        topTargets:
          type: array
          items:
            $ref: '#/components/schemas/TargetStatItem'

    CountryStatItem:
      type: object
      properties:
        countryCode:
          type: string
          description: 2-letter ISO country code
          example: US
        amount:
          type: integer
          example: 150

    ScenarioStatItem:
      type: object
      properties:
        scenario:
          type: string
          example: crowdsecurity/ssh-bruteforce
        amount:
          type: integer
          example: 200

    IpOwnerStatItem:
      type: object
      properties:
        ipOwner:
          type: string
          description: AS name from alert source
          example: Amazon.com, Inc.
        amount:
          type: integer
          example: 100

    TargetStatItem:
      type: object
      properties:
        target:
          type: string
          description: Target FQDN extracted from target_fqdn in events metadata
          example: example.com
        amount:
          type: integer
          example: 45

    HistoryItem:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
          example: '2026-02-14'
        amount:
          type: integer
          description: Number of alerts for that date
          example: 15

    AllowlistItem:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          description: Item creation timestamp
          example: '2026-03-02T19:45:00.435Z'
        expiration:
          type: string
          format: date-time
          description: Item expiration timestamp (0001-01-01T00:00:00.000Z means never expires)
          example: '0001-01-01T00:00:00.000Z'
        value:
          type: string
          description: The allowlist item value (IP address, range, etc.)
          example: '1.0.0.1'

    Blocklist:
      type: object
      description: |
        A blocklist entry (without IPs array). Includes `count_ips` with the number of blocked entries
        and a `type` field indicating the origin (`api` = managed by this API, `cs` = managed by CrowdSec).
      properties:
        id:
          type: integer
          description: Blocklist primary key
          example: 1
        name:
          type: string
          description: Blocklist name.
          example: 'My Blocklist'
        type:
          type: string
          enum: [api, cs]
          description: |
            Origin of the blocklist.
            - `api`: managed by this API (URL-based, stored in `blocklists` table)
            - `cs`: managed by CrowdSec Central API / console (stored in `cs_blocklists` table)
          example: 'api'
        count_ips:
          type: integer
          description: Number of IPs/ranges associated with this blocklist
          example: 42
        url:
          type: string
          description: "Source URL (only present for `type: api` blocklists)"
          example: 'https://example.com/blocklist.txt'
        enabled:
          type: boolean
          description: "Whether the blocklist is enabled (only present for `type: api` blocklists)"
          example: true
        added_date:
          type: string
          format: date-time
          description: "Date the blocklist was added (only present for `type: api` blocklists)"
          example: '2026-03-01T10:00:00.000Z'
        last_refresh_attempt:
          type: string
          format: date-time
          nullable: true
          description: "Last refresh attempt timestamp (only present for `type: api` blocklists)"
          example: '2026-03-08T19:52:14.000Z'
        last_successful_refresh:
          type: string
          format: date-time
          nullable: true
          description: "Last successful refresh timestamp (only present for `type: api` blocklists)"
          example: '2026-03-08T19:52:14.000Z'

    BlocklistWithIps:
      allOf:
        - $ref: '#/components/schemas/Blocklist'
        - type: object
          properties:
            blocklistIps:
              type: array
              description: Full list of blocked IPs/ranges belonging to this blocklist
              items:
                $ref: '#/components/schemas/BlocklistIp'

    BlocklistWithIpStrings:
      allOf:
        - $ref: '#/components/schemas/Blocklist'
        - type: object
          properties:
            blocklistIps:
              type: array
              description: Plain IP/range strings belonging to this blocklist
              items:
                type: string
                example: '192.35.168.0/23'

    BlocklistIp:
      type: object
      description: A single blocked IP or range entry. Linked to either an API-managed blocklist (`blocklist_id`) or a CrowdSec-managed blocklist (`cs_blocklist_id`), depending on `origin`.
      properties:
        id:
          type: integer
          description: Auto-incremented primary key
          example: 1
        blocklist_id:
          type: integer
          nullable: true
          description: FK referencing the parent `blocklists` row. Null for `cs_blocklist` origin.
          example: 3
        cs_blocklist_id:
          type: integer
          nullable: true
          description: FK referencing the parent `cs_blocklists` row. Null for `blocklist` origin.
          example: null
        blocklist_name:
          type: string
          description: |
            For `blocklist` origin: name of the parent API-managed blocklist.
            For `cs_blocklist` origin: `scenario` field of the CrowdSec decision.
          example: 'My Blocklist'
        value:
          type: string
          description: The blocked IP address or CIDR range
          example: '192.35.168.0/23'
        origin:
          type: string
          enum: [blocklist, cs_blocklist]
          description: |
            Origin of this entry.
            - `blocklist`: added by this API from a URL-based blocklist
            - `cs_blocklist`: added by CrowdSec Central API / console
          example: 'blocklist'

    Allowlist:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          description: Allowlist creation timestamp
          example: '2026-03-02T19:44:58.246Z'
        description:
          type: string
          description: Allowlist description
          example: 'Known IPs'
        items:
          type: array
          items:
            $ref: '#/components/schemas/AllowlistItem'
          description: Items contained in the allowlist
        name:
          type: string
          description: Allowlist name/identifier
          example: 'known_ips'
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: '2026-03-02T19:45:02.611Z'

    ProcessBlocklistProgress:
      type: object
      description: IP processing progress counters (processIps sub-object within ProcessBlocklist)
      properties:
        totalIps:
          type: integer
          description: Total number of IPs to process
          example: 5000
        processedIps:
          type: integer
          description: Number of IPs processed so far
          example: 2500

    ProcessBlocklistIps:
      type: object
      description: IP counters for blocklist disable and delete operations
      properties:
        blocklistIps:
          type: integer
          description: Total number of IPs stored in the blocklist
          example: 1200
        ipsToDelete:
          type: integer
          description: Total number of CrowdSec decisions to remove
          example: 1200
        processedIps:
          type: integer
          description: Number of decisions removed so far
          example: 800

    ProcessBlocklist:
      type: object
      properties:
        step:
          type: string
          enum: [fetch, parse, import]
          description: Current step of the blocklist operation
          example: import
        fetched:
          type: string
          enum: [pending, running, successful, failed]
          description: Status of the fetch step
          example: successful
        parsed:
          type: string
          enum: [pending, running, successful, failed]
          description: Status of the parse step
          example: successful
        imported:
          type: string
          enum: [pending, running, successful, failed]
          description: Status of the import step (pushing IPs to CrowdSec)
          example: running
        processIps:
          $ref: '#/components/schemas/ProcessBlocklistProgress'

    Process:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique process identifier
          example: '3f1a2b4c-0000-0000-0000-000000000001'
        beginDatetime:
          type: string
          format: date-time
          description: Timestamp when the process started
          example: '2026-04-08T10:00:00.000Z'
        endDatetime:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the process finished. Null if still running
          example: null
        successful:
          type: boolean
          nullable: true
          description: Whether the process finished successfully. Null if still running
          example: null
        blocklistImport:
          $ref: '#/components/schemas/ProcessBlocklist'
          description: Present only when the process is a blocklist import (new blocklist added)
        blocklistEnable:
          $ref: '#/components/schemas/ProcessBlocklist'
          description: Present only when the process is a blocklist enable operation
        blocklistDisable:
          $ref: '#/components/schemas/ProcessBlocklistIps'
          description: Present only when the process is a blocklist disable operation
        blocklistDelete:
          $ref: '#/components/schemas/ProcessBlocklistIps'
          description: Present only when the process is a blocklist delete operation
        blocklistRefresh:
          $ref: '#/components/schemas/ProcessBlocklistRefresh'
          description: Present only when the process is a scheduled/bulk blocklist refresh operation
        error:
          type: string
          nullable: true
          description: Descriptive error message if the process failed, null otherwise
          example: null

    ProcessBlocklistRefresh:
      type: object
      properties:
        totalBlocklists:
          type: integer
          description: Total number of blocklists to refresh
          example: 10
        processedBlocklists:
          type: integer
          description: Number of blocklists processed so far
          example: 5
        successful:
          type: integer
          description: Number of successfully refreshed blocklists
          example: 4
        failed:
          type: integer
          description: Number of failed blocklist refreshes
          example: 1

  responses:
    UnauthorizedError:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
              message:
                type: string
                example: Authorization header is required
          examples:
            missing_header:
              value:
                error: Unauthorized
                message: Authorization header is required
            invalid_format:
              value:
                error: Unauthorized
                message: 'Authorization header must be in format: Bearer <token>'
            invalid_credentials:
              value:
                error: Unauthorized
                message: Invalid credentials

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Validation error
            message: limit must be a positive integer
